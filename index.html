<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"
      content="Subscribe for daily fresh vegetables, fruits, dairy & more delivered before 8 AM. Zero delivery charges on subscriptions. Serving RR Nagar, Bengaluru."

    <link rel="apple-touch-icon" href="/logo_icon_green.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#099E0E" />

      property="og:title"

      name="twitter:title"
      content="Genzy Basket — Fresh Groceries Delivered Daily"
